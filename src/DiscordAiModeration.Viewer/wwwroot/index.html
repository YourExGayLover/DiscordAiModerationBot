<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Discord AI Moderation Viewer</title>
    <link rel="stylesheet" href="/site.css" />
</head>
<body>
    <div class="layout">
        <aside class="sidebar guilds">
            <h2>Guilds</h2>
            <div id="status" class="status">Loading status...</div>
            <div id="guilds"></div>
        </aside>

        <aside class="sidebar channels">
            <h2>Channels</h2>
            <div id="channels"></div>
        </aside>

        <main class="messages-panel">
            <header class="toolbar">
                <h1 id="currentChannel">Select a channel</h1>
                <button id="refreshButton" type="button">Refresh</button>
            </header>
            <section id="messages" class="messages"></section>
        </main>
    </div>

    <script src="/site.js"></script>
</body>
</html>
